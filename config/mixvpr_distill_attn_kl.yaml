# ----------------------------------------------------------------------------
# Phase C2 — Local Semantic Attention Distillation (CLIP CLS→patch KL).
#
#   L_total = L_vpr + lambda_global * L_global + lambda_kl * L_attn
#
# A learnable 1x1-Conv SpatialAttentionHead on the 20x20 backbone features
# predicts a spatial distribution, supervised by CLIP ViT-B-16's last-layer
# CLS-to-patch attention via KL divergence. The student attention reweights the
# feature map (mean multiplier 1.0) BEFORE MixVPR, and is RETAINED at inference
# (CLIP is discarded). distill_mode="global_only" disables the SG-SA region
# branch so this isolates the attention contribution.
# ----------------------------------------------------------------------------

datamodule:
  train_set_name: "gsv-cities"
  train_image_size:
    - 320
    - 320
  img_per_place: 4
  batch_size: 100          # reduce to 80/60 if OOM with the teacher loaded
  num_workers: 8
  val_set_names:
    - "msls-val"
    - "pitts30k-val"

backbone:
  module: src.models.backbones
  class: ResNet
  params:
    backbone_name: "resnet50"
    pretrained: true
    crop_last_block: true
    num_unfrozen_blocks: 1

aggregator:
  module: src.models.aggregators
  class: MixVPR
  params:
    in_channels:
    in_h: 20
    in_w: 20
    out_channels: 512
    mix_depth: 4
    mlp_ratio: 1
    out_rows: 4

loss_function:
  module: src.losses
  class: VPRLossFunction
  params:
    loss_fn_name: "MultiSimilarityLoss"
    miner_name: "MultiSimilarityMiner"

distillation:
  enabled: true
  mode: "global_only"        # no SG-SA region branch — isolate the C-phase head
  teacher:
    model_name: "ViT-B-16"
    pretrained: "openai"
  proj_dim:
  tau: 0.07
  lambda_global: 0.05        # set to your best B2/B3 value
  lambda_region: 0.0
  distill_warmup_steps: 1500
  spatial_attn:
    enabled: true
    num_heads: 1
    lambda_kl: 0.1           # C2 default; swept in C3

trainer:
  optimizer: adamw
  lr: 0.0002
  wd: 0.001
  warmup: 1500
  max_epochs: 40
  milestones:
    - 10
    - 20
    - 30
  lr_mult: 0.1