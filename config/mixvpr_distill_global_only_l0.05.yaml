# ----------------------------------------------------------------------------
# Ablation: Global-Only Distillation (lambda sweep)
#   L_total = L_vpr + lambda_g * L_global
#   Only CLS-level global alignment; no region/spatial distillation.
#   B2 sweep config: lambda_global = 0.05.
# ----------------------------------------------------------------------------

#---------------------------------------------------
# Datamodule Configuration
#---------------------------------------------------
datamodule:
  train_set_name: "gsv-cities"
  train_image_size: 
    - 320
    - 320
  img_per_place: 4
  batch_size: 100
  num_workers: 8
  val_set_names:
    - "msls-val"
    - "pitts30k-val"

#---------------------------------------------------
# VPR Model Configuration
#---------------------------------------------------
backbone:
  module: src.models.backbones
  class: ResNet
  params:
    backbone_name: "resnet50"
    pretrained: true
    crop_last_block: true
    num_unfrozen_blocks: 1

aggregator:
  module: src.models.aggregators
  class: MixVPR
  params:
    in_channels:            # auto-filled from backbone.out_channels
    in_h: 20
    in_w: 20
    out_channels: 512
    mix_depth: 4
    mlp_ratio: 1
    out_rows: 4

#---------------------------------------------------
# Loss Function Configuration
#---------------------------------------------------
loss_function:
  module: src.losses
  class: VPRLossFunction
  params:
    loss_fn_name: "MultiSimilarityLoss"
    miner_name: "MultiSimilarityMiner"

#---------------------------------------------------
# Distillation Configuration — Global Only
#---------------------------------------------------
distillation:
  enabled: true
  mode: "global_only"       # <- no region computation at all
  teacher:
    model_name: "ViT-B-16"
    pretrained: "openai"
  proj_dim:                 # not used in global_only mode
  tau: 0.07                 # not used in global_only mode
  lambda_global: 0.05       # B2 sweep
  lambda_region: 0.0        # <- disabled: no region distillation
  distill_warmup_steps: 0   # B1: no warmup

#---------------------------------------------------
# Trainer Configuration
#---------------------------------------------------
trainer:
  optimizer: adamw
  lr: 0.0002
  wd: 0.001
  warmup: 1500
  max_epochs: 40
  milestones:
    - 10
    - 20
    - 30
  lr_mult: 0.1
