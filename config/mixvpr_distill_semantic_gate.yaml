# ----------------------------------------------------------------------------
# Ablation: Semantic-Gated Region Distillation
#   L_total = L_vpr + λ_g · L_global + λ_r · L_region
#   Region weights are modulated by a CLIP semantic suppression gate that
#   down-weights patches corresponding to dynamic/unstable objects
#   (cars, people, buses, trees, sky, etc.), focusing distillation on
#   stable landmarks (buildings, road structure, fixed infrastructure).
#   No augmented view needed (unlike region_gate).
# ----------------------------------------------------------------------------

#---------------------------------------------------
# Datamodule Configuration
#---------------------------------------------------
datamodule:
  train_set_name: "gsv-cities"
  train_image_size: 
    - 320
    - 320
  img_per_place: 4
  batch_size: 100
  num_workers: 8
  val_set_names:
    - "msls-val"
    - "pitts30k-val"

#---------------------------------------------------
# VPR Model Configuration
#---------------------------------------------------
backbone:
  module: src.models.backbones
  class: ResNet
  params:
    backbone_name: "resnet50"
    pretrained: true
    crop_last_block: true
    num_unfrozen_blocks: 1

aggregator:
  module: src.models.aggregators
  class: MixVPR
  params:
    in_channels:            # auto-filled from backbone.out_channels
    in_h: 20
    in_w: 20
    out_channels: 512
    mix_depth: 4
    mlp_ratio: 1
    out_rows: 4

#---------------------------------------------------
# Loss Function Configuration
#---------------------------------------------------
loss_function:
  module: src.losses
  class: VPRLossFunction
  params:
    loss_fn_name: "MultiSimilarityLoss"
    miner_name: "MultiSimilarityMiner"

#---------------------------------------------------
# Distillation Configuration — Semantic Gate
#---------------------------------------------------
distillation:
  enabled: true
  mode: "region_semantic_gate"    # ← semantic suppression gate
  teacher:
    model_name: "ViT-B-16"
    pretrained: "openai"
  # Dynamic objects only — suppress vehicles & pedestrians, keep structural cues (tree/sky)
  dynamic_categories:
    - "car"
    - "truck"
    - "bus"
    - "person"
    - "pedestrian"
    - "bicycle"
    - "motorcycle"
  proj_dim:                       # null → defaults to backbone.out_channels (1024)
  tau: 0.07
  lambda_global: 0.1
  lambda_region: 0.05
  distill_warmup_steps: 1500

#---------------------------------------------------
# Trainer Configuration
#---------------------------------------------------
trainer:
  optimizer: adamw
  lr: 0.0002
  wd: 0.001
  warmup: 1500
  max_epochs: 40
  milestones:
    - 10
    - 20
    - 30
  lr_mult: 0.1
