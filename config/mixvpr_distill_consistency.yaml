# ----------------------------------------------------------------------------
# Phase D1 — Cross-view attention consistency.
#
#   L_total = L_vpr + lambda_global*L_global + lambda_kl*L_attn
#                   + lambda_consist*L_consist
#
# Builds on C2. L_consist pulls together the spatial-attention maps of the K
# views of the same place (1 - mean off-diagonal cosine within each place),
# teaching the student that VPR-relevant regions are stable across views.
# ----------------------------------------------------------------------------

datamodule:
  train_set_name: "gsv-cities"
  train_image_size:
    - 320
    - 320
  img_per_place: 4
  batch_size: 100
  num_workers: 8
  val_set_names:
    - "msls-val"
    - "pitts30k-val"

backbone:
  module: src.models.backbones
  class: ResNet
  params:
    backbone_name: "resnet50"
    pretrained: true
    crop_last_block: true
    num_unfrozen_blocks: 1

aggregator:
  module: src.models.aggregators
  class: MixVPR
  params:
    in_channels:
    in_h: 20
    in_w: 20
    out_channels: 512
    mix_depth: 4
    mlp_ratio: 1
    out_rows: 4

loss_function:
  module: src.losses
  class: VPRLossFunction
  params:
    loss_fn_name: "MultiSimilarityLoss"
    miner_name: "MultiSimilarityMiner"

distillation:
  enabled: true
  mode: "global_only"
  teacher:
    model_name: "ViT-B-16"
    pretrained: "openai"
  proj_dim:
  tau: 0.07
  lambda_global: 0.05
  lambda_region: 0.0
  distill_warmup_steps: 1500
  spatial_attn:
    enabled: true
    num_heads: 1
    lambda_kl: 0.1            # use your best C3 value
  consistency:
    lambda: 0.05             # D1

trainer:
  optimizer: adamw
  lr: 0.0002
  wd: 0.001
  warmup: 1500
  max_epochs: 40
  milestones:
    - 10
    - 20
    - 30
  lr_mult: 0.1